onyxia:
  web:
    env:
      ONYXIA_API_URL: https://your.onyxia.domain.tld/api
      OIDC_DISABLE_DPOP: "true"

# Actual values specific to LS³ starts here.

# Remeber to bump the ?v=x each time the plugin is updated.
      CUSTOM_HTML_HEAD: |
        <script src="%PUBLIC_URL%/custom-resources/js/index.mjs?v=1" type="module"></script>
      AUTHENTICATION_GLOBALLY_REQUIRED: "true"
      VAULT_DOCUMENTATION_LINK: https://some.domain.tld/path/to/vault-documentation
      QUOTA_WARNING_THRESHOLD: 75%
      QUOTA_CRITICAL_THRESHOLD: 95%
      SAMPLE_DATASET_URL: "s3://bucket-name/path/to/some-file.parquet"
      TERMS_OF_SERVICES: |
        {
          en: "%PUBLIC_URL%/custom-resources/docs/tos/en.md",
          fr: "%PUBLIC_URL%/custom-resources/docs/tos/fr.md"
        }
      DISABLE_PERSONAL_INFOS_INJECTION_IN_GROUP: "true"
      DISABLE_AUTO_LAUNCH: "true"
      PALETTE_OVERRIDE: |
        {
          focus: {
            main: "#0E7271",
            light: "#32CFC8",
            light2: "#A3ECE4"
          },
          dark: {
            main: "#222431",
            light: "#2E3041",
            greyVariant1: "#1B1D2A",
            greyVariant2: "#404256",
            greyVariant3: "#404256",
            greyVariant4: "#BAB9CA",
            greyVariant5: "#D0D5DB"
          },
          light: {
            main: "#F3F3F6",
            light: "#FAFAFA",
            greyVariant1: "#EAE9F2",
            greyVariant2: "#D1D0DC",
            greyVariant3: "#BAB9CA",
            greyVariant4: "#5C5F78",
            greyVariant5: "#464A52"
          }
        }
# The social media card gets displayed when you share the link of your Onyxia instance on social media :
      SOCIAL_MEDIA_IMAGE: "%PUBLIC_URL%/custom-resources/assets/onyxia-logo-LS3.png"
      SOCIAL_MEDIA_TITLE: "Onyxia - Your datascience platform name"
      SOCIAL_MEDIA_DESCRIPTION: "Your datascience platform name"
      HEADER_LOGO: |
        {
          light: "%PUBLIC_URL%/custom-resources/assets/onyxia-logo-LS3.png",
          dark: "%PUBLIC_URL%/custom-resources/assets/onyxia-logo-LS3.png"
        }
      HEADER_HIDE_ONYXIA: true
      HEADER_TEXT_BOLD: LS³
      HEADER_TEXT_FOCUS: Onyxia
      HEADER_LINKS: |
        [
          {
            label: "Documentation",
            icon: "language",
            url: "https://some.domain.tld/path/to/datascience-platform-documentation"
          }
        ]
      SPLASHSCREEN_LOGO: |
        {
          light: "%PUBLIC_URL%/custom-resources/assets/ls3-light.svg",
          dark: "%PUBLIC_URL%/custom-resources/assets/ls3-dark.svg"
        }
      TAB_TITLE: "Your datascience platform name"
      ENABLED_LANGUAGES: fr
      GLOBAL_ALERT: |
        {
          "severity": "success",
          "message": "Welcome to your Onyxia, the gateway to your datascience platform"
        }